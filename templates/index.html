<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 World News + History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; min-height: 100vh; color: #eee; }
        header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.8rem; color: #e94560; }
        header p { color: #aaa; font-size: 0.9rem; }
        .controls { padding: 25px 40px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: #1a1d27; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .region-btn { padding: 8px 18px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #eee; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .region-btn:hover, .region-btn.active { background: #e94560; border-color: #e94560; }
        .refresh-btn { padding: 10px 25px; background: #e94560; border: none; color: white; border-radius: 20px; cursor: pointer; font-weight: bold; margin-left: auto; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .main { padding: 30px 40px; max-width: 1200px; margin: 0 auto; }
        .loading { text-align: center; padding: 80px; display: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: #1a1d27; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
        .card-image { width: 100%; height: 200px; object-fit: cover; background: #2a2d3a; }
        .card-image-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, #1e2a3a, #2a1e3a); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .card-title a { color: #53d8fb; text-decoration: none; }
        .card-title a:hover { color: #e94560; }
        .card-summary { font-size: 0.85rem; color: #999; line-height: 1.5; margin-bottom: 15px; }
        .card-date { font-size: 0.75rem; color: #666; margin-bottom: 15px; }
        .history-section { background: rgba(233,69,96,0.08); border-left: 3px solid #e94560; border-radius: 0 8px 8px 0; padding: 12px 15px; margin-top: 15px; }
        .history-title { font-size: 0.75rem; font-weight: bold; color: #e94560; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .history-text { font-size: 0.85rem; color: #ccc; line-height: 1.6; }
        .lesson-section { background: rgba(83,216,251,0.08); border-left: 3px solid #53d8fb; border-radius: 0 8px 8px 0; padding: 10px 15px; margin-top: 10px; }
        .lesson-title { font-size: 0.75rem; font-weight: bold; color: #53d8fb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .lesson-text { font-size: 0.82rem; color: #bbb; line-height: 1.5; font-style: italic; }
        .error-msg { text-align: center; padding: 60px; color: #e94560; font-size: 1.1rem; }
    </style>
</head>
<body>
<header>
    <div>
        <h1>🌍 World News + History</h1>
        <p>Stay informed — understand the past behind today's events</p>
    </div>
    <div style="color:#888; font-size:0.85rem;">Powered by Claude AI 🤖</div>
</header>
<div class="controls">
    {% for region in regions %}
    <button class="region-btn {% if loop.first %}active{% endif %}" onclick="loadNews('{{ region }}', this)">{{ region }}</button>
    {% endfor %}
    <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">🔄 Refresh</button>
</div>
<div class="main">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Fetching news & analyzing history... ⏳</p>
        <p style="font-size:0.85rem; margin-top:8px; color:#666;">This takes about 15-20 seconds</p>
    </div>
    <div class="cards-grid" id="content"></div>
</div>
<script>
    let currentRegion = "World";
    function loadNews(region, btn) {
        currentRegion = region;
        document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        fetchNews();
    }
    function refreshNews() { fetchNews(); }
    function fetchNews() {
        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        const btn = document.getElementById('refreshBtn');
        loading.style.display = 'block';
        content.innerHTML = '';
        btn.disabled = true;
        btn.textContent = '⏳ Loading...';
        fetch(`/api/news?region=${currentRegion}`)
            .then(r => r.json())
            .then(data => {
                loading.style.display = 'none';
                btn.disabled = false;
                btn.textContent = '🔄 Refresh';
                if (data.error) { content.innerHTML = `<div class="error-msg">❌ ${data.error}</div>`; return; }
                content.innerHTML = data.articles.map(a => `
                    <div class="card">
                        ${a.image ? `<img class="card-image" src="${a.image}" alt="${a.title}" onerror="this.style.display='none'">` : `<div class="card-image-placeholder">🌍</div>`}
                        <div class="card-body">
                            <div class="card-date">📅 ${a.published || 'Recent'}</div>
                            <div class="card-title"><a href="${a.link}" target="_blank">${a.title}</a></div>
                            <div class="card-summary">${a.summary}</div>
                            ${a.historical ? `<div class="history-section"><div class="history-title">📜 Historical Context</div><div class="history-text">${a.historical}</div></div>` : ''}
                            ${a.lesson ? `<div class="lesson-section"><div class="lesson-title">💡 Lesson from History</div><div class="lesson-text">${a.lesson}</div></div>` : ''}
                        </div>
                    </div>`).join('');
            })
            .catch(() => { loading.style.display = 'none'; btn.disabled = false; btn.textContent = '🔄 Refresh'; content.innerHTML = `<div class="error-msg">❌ Connection error</div>`; });
    }
    window.onload = () => fetchNews();
</script>
</body>
</html>
