<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 World News + History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; color: #eee; }
        header { background: rgba(255,255,255,0.05); padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.8rem; color: #e94560; }
        header p { color: #aaa; font-size: 0.9rem; }
        .controls { padding: 30px 40px 10px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .region-btn { padding: 10px 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #eee; border-radius: 25px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .region-btn:hover, .region-btn.active { background: #e94560; border-color: #e94560; }
        .refresh-btn { padding: 10px 25px; background: #e94560; border: none; color: white; border-radius: 25px; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-left: auto; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .main { padding: 20px 40px 40px; }
        .loading { text-align: center; padding: 60px; display: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; }
        .card h2 { font-size: 1.1rem; color: #e94560; margin-bottom: 15px; }
        .news-list { display: flex; flex-direction: column; gap: 12px; }
        .news-item { padding: 12px 15px; background: rgba(255,255,255,0.03); border-left: 3px solid #e94560; border-radius: 0 8px 8px 0; }
        .news-item a { color: #53d8fb; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .news-item .date { color: #888; font-size: 0.75rem; margin-top: 4px; }
        .analysis-card { grid-column: 1 / -1; }
        .analysis-content { line-height: 1.8; color: #ddd; font-size: 0.95rem; white-space: pre-wrap; }
        .error-msg { text-align: center; padding: 40px; color: #e94560; }
    </style>
</head>
<body>
<header>
    <div>
        <h1>🌍 World News + History</h1>
        <p>Stay informed — understand the past behind today's events</p>
    </div>
    <div style="color:#888; font-size:0.85rem;">Powered by Claude AI 🤖</div>
</header>
<div class="controls">
    {% for region in regions %}
    <button class="region-btn {% if loop.first %}active{% endif %}" onclick="loadNews('{{ region }}', this)">{{ region }}</button>
    {% endfor %}
    <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">🔄 Load News</button>
</div>
<div class="main">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Fetching news & analyzing history... ⏳</p>
        <p style="font-size:0.85rem; margin-top:8px; color:#666;">This takes about 15-20 seconds</p>
    </div>
    <div id="content"></div>
</div>
<script>
    let currentRegion = "World";
    function loadNews(region, btn) {
        currentRegion = region;
        document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        fetchNews();
    }
    function refreshNews() { fetchNews(); }
    function fetchNews() {
        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        const btn = document.getElementById('refreshBtn');
        loading.style.display = 'block';
        content.innerHTML = '';
        btn.disabled = true;
        btn.textContent = '⏳ Loading...';
        fetch(`/api/news?region=${currentRegion}`)
            .then(r => r.json())
            .then(data => {
                loading.style.display = 'none';
                btn.disabled = false;
                btn.textContent = '🔄 Refresh';
                if (data.error) { content.innerHTML = `<div class="error-msg">❌ ${data.error}</div>`; return; }
                let html = `<div class="content-grid"><div class="card"><h2>📰 Latest Headlines</h2><div class="news-list">`;
                data.articles.forEach(a => { html += `<div class="news-item"><a href="${a.link}" target="_blank">${a.title}</a><div class="date">📅 ${a.published || 'Recent'}</div></div>`; });
                html += `</div></div><div class="card analysis-card"><h2>🧠 Summary + Historical Context</h2><div class="analysis-content">${data.analysis}</div></div></div>`;
                content.innerHTML = html;
            })
            .catch(() => { loading.style.display = 'none'; btn.disabled = false; btn.textContent = '🔄 Refresh'; content.innerHTML = `<div class="error-msg">❌ Connection error</div>`; });
    }
    window.onload = () => fetchNews();
</script>
</body>
</html>
